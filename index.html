<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI知育玩具コンシェルジュ</title>

  <link rel="icon" type="image/png" href="favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Zen Maru Gothic', sans-serif; background-color: #fdfbf7; }
    
    /* ローディングアニメーション */
    .loader {
      border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%;
      width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* スムーズスクロールを有効化 */
    html { scroll-behavior: smooth; }
  </style>
</head>
<body class="text-gray-700 min-h-screen pb-12">

  <div class="w-full max-w-5xl mx-auto mb-4">
    <div style="position: relative; width: 100%; height: 0; padding-top: 56.2225%;
    padding-bottom: 0; box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16); margin-top: 0; margin-bottom: 0.9em; overflow: hidden;
    border-radius: 8px; will-change: transform;">
      <iframe loading="lazy" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; padding: 0;margin: 0;"
        src="https://www.canva.com/design/DAHAd8J_bm0/YfjgiR1coEIRCh335VZRmg/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen">
      </iframe>
    </div>
    
    <div class="text-xs text-right text-gray-400 px-2">
      数万点の中から<a href="https://www.canva.com/design/DAHAd8J_bm0/YfjgiR1coEIRCh335VZRmg/view?utm_content=DAHAd8J_bm0&amp;utm_campaign=designshare&amp;utm_medium=embeds&amp;utm_source=link" target="_blank" rel="noopener" class="hover:underline">お子様の才能を伸ばすおもちゃ、AIが見つけます</a>
    </div>
  </div>

  <div class="max-w-3xl mx-auto px-4">
    
    <div class="pt-4 pb-2 -mx-4 px-4 transition-all duration-300">
      <div class="bg-white p-4 md:p-6 rounded-2xl shadow border border-gray-200">
        <h2 class="text-center text-lg font-bold text-gray-600 mb-4 flex items-center justify-center gap-2">
          <span>🔍</span> 条件を入力して検索
        </h2>
  
        <div class="grid grid-cols-2 gap-3 mb-3">
          <div>
            <label class="block text-xs font-bold mb-1 text-blue-600">年齢</label>
            <select id="age" class="w-full p-2 bg-blue-50 rounded-lg border-none focus:outline-none focus:ring-2 focus:ring-blue-400 cursor-pointer text-sm">
              <option value="0歳">0歳</option>
              <option value="1歳">1歳</option>
              <option value="2歳">2歳</option>
              <option value="3歳" selected>3歳</option>
              <option value="4歳">4歳</option>
              <option value="5歳">5歳</option>
              <option value="6歳以上">6歳以上</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold mb-1 text-blue-600">性別</label>
            <select id="gender" class="w-full p-2 bg-blue-50 rounded-lg border-none focus:outline-none focus:ring-2 focus:ring-blue-400 cursor-pointer text-sm">
              <option value="男の子">男の子</option>
              <option value="女の子">女の子</option>
              <option value="こだわらない">こだわらない</option>
            </select>
          </div>
        </div>
  
        <div class="mb-4">
          <label class="block text-xs font-bold mb-1 text-blue-600">特性・好きなこと</label>
          <textarea id="traits" rows="2" class="w-full p-2 bg-blue-50 rounded-lg border-none focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm" placeholder="例：恐竜が好き。集中力がある。"></textarea>
        </div>
  
        <button id="search-button" onclick="startSearch()" class="w-full bg-gradient-to-r from-blue-400 to-blue-600 hover:from-blue-500 hover:to-blue-700 text-white font-bold py-3 rounded-xl shadow-md transform transition hover:scale-[1.01] active:scale-95 flex items-center justify-center gap-2 text-sm">
          <span>AIに提案してもらう</span> 🎁
        </button>
      </div>
    </div>

    <div id="loading" class="hidden text-center py-10 mt-8 scroll-mt-10">
      <div class="loader mb-4"></div>
      <p class="text-blue-500 font-bold animate-pulse">AI知育玩具コンシェルジュが最適な玩具を選んでいます...</p>
      <p class="text-xs text-gray-400 mt-2">（20〜30秒ほどかかります）</p>
    </div>

    <div id="results" class="space-y-6 mt-8"></div>
  </div>

  <script>
    // ▼▼▼【重要】GASウェブアプリURL ▼▼▼
    const API_URL = "https://script.google.com/macros/s/AKfycbzL_VmjCm2bGTwnq80CMlV6pLtYM-HaWG0OeiiEC0e0zo9SgG6ghT96jddzgRCe9m_w/exec"; 
    // ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

    async function startSearch() {
      const age = document.getElementById('age').value;
      const gender = document.getElementById('gender').value;
      const traits = document.getElementById('traits').value;
      const loadingDiv = document.getElementById('loading');
      const searchButton = document.getElementById('search-button');

      if (!traits.trim()) {
        alert("お子様の特性を入力してください。");
        return;
      }

      // 1. UIの準備
      document.getElementById('results').innerHTML = "";
      loadingDiv.classList.remove('hidden');
      
      // 2. 自動スクロール（ローディングが画面に入るように）
      // block: 'center' で画面の中央付近にスクロールさせ、視認性を高めます
      loadingDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });

      // 3. ボタンの無効化（連打防止）
      searchButton.disabled = true;
      searchButton.classList.add('opacity-50', 'cursor-not-allowed');

      try {
        const url = `${API_URL}?age=${encodeURIComponent(age)}&gender=${encodeURIComponent(gender)}&traits=${encodeURIComponent(traits)}`;
        const response = await fetch(url, { method: "GET", headers: { "Content-Type": "text/plain" } });
        const data = await response.json();
        
        if (data.error) {
          showError({ message: data.error });
        } else {
          showResults(data);
        }

      } catch (error) {
        showError(error);
      } finally {
        // 4. ボタンの復元
        searchButton.disabled = false;
        searchButton.classList.remove('opacity-50', 'cursor-not-allowed');
      }
    }

    function showResults(data) {
      document.getElementById('loading').classList.add('hidden');
      const container = document.getElementById('results');

      if (!data || data.length === 0) {
        container.innerHTML = `<div class="text-center p-8 bg-white rounded-xl border border-dashed border-gray-300"><p class="text-gray-500">条件に合う商品が見つかりませんでした。</p></div>`;
        return;
      }

      let html = "";
      data.forEach(item => {
        html += `
          <div class="bg-white rounded-2xl shadow-md overflow-hidden flex flex-col md:flex-row border border-gray-100 hover:shadow-xl transition duration-300 transform hover:-translate-y-1">
            <div class="md:w-1/3 bg-gray-50 flex items-center justify-center p-4">
              <img src="${item.imageUrl}" alt="${item.productName}" class="max-h-48 object-contain mix-blend-multiply">
            </div>
            <div class="p-6 md:w-2/3 flex flex-col justify-between">
              <div>
                <div class="flex items-center gap-2 mb-2">
                   <span class="bg-blue-100 text-blue-800 text-xs font-bold px-2 py-1 rounded">Keyword: ${item.keyword}</span>
                </div>
                <h3 class="text-lg font-bold text-gray-800 mb-2 leading-tight line-clamp-2">${item.productName}</h3>
                <div class="bg-yellow-50 p-3 rounded-lg border border-yellow-100 text-sm text-gray-700 mb-4">
                  <span class="font-bold text-orange-500">💡 おすすめ理由:</span><br>
                  ${item.reason}
                </div>
              </div>
              <div class="flex items-center justify-between mt-2 pt-4 border-t border-gray-100">
                <span class="text-xl font-bold text-red-500">${item.price}</span>
                <a href="${item.itemUrl}" target="_blank" class="bg-gradient-to-r from-orange-400 to-orange-500 hover:from-orange-500 hover:to-orange-600 text-white font-bold py-2 px-6 rounded-full shadow transition flex items-center gap-1">
                  楽天で見る <span>↗</span>
                </a>
              </div>
            </div>
          </div>`;
      });
      container.innerHTML = html;
      
      // 結果が表示されたら、結果の先頭へスクロール
      container.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function showError(error) {
      document.getElementById('loading').classList.add('hidden');
      alert("エラーが発生しました: " + error.message);
    }
  </script>
</body>
</html>
